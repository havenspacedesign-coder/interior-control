<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>室內設計案件總控系統</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f7f5;--surface:#fff;--border:#e8e5e0;
  --text:#1a1a1a;--text2:#6b6560;--text3:#9c9690;
  --purple:#534AB7;--pl:#EEEDFE;--pd:#3C3489;
  --teal:#1D9E75;--tl:#E1F5EE;--td:#085041;
  --amber:#BA7517;--al:#FAEEDA;--ad:#633806;
  --red:#E24B4A;--rl:#FCEBEB;--rd:#791F1F;
  --green:#639922;--gl:#EAF3DE;--gd:#27500A;
  --r:8px;--rl2:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

/* Auth screens */
#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl2);padding:40px;width:360px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.08)}
.login-logo{font-size:22px;font-weight:700;margin-bottom:6px}.login-logo span{color:var(--purple)}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:28px}
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:11px 20px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);cursor:pointer;font-size:14px;font-family:inherit;font-weight:500}
.google-btn:hover{background:var(--bg)}
#pending-screen{position:fixed;inset:0;background:var(--bg);display:none;align-items:center;justify-content:center;z-index:1000}
.pending-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl2);padding:40px;width:380px;text-align:center}
#app-screen{display:none}

/* App layout */
.app{display:flex;flex-direction:column;min-height:100vh}
.topnav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.25rem;display:flex;align-items:center;gap:1rem;height:50px;position:sticky;top:0;z-index:50}
.logo{font-size:15px;font-weight:600;white-space:nowrap}.logo span{color:var(--purple)}
.nav-tabs{display:flex;gap:1px;overflow-x:auto;flex:1}
.nav-tab{padding:5px 12px;font-size:13px;border:none;background:none;cursor:pointer;border-radius:var(--r);color:var(--text2);white-space:nowrap;font-family:inherit}
.nav-tab:hover{background:var(--bg);color:var(--text)}
.nav-tab.active{background:var(--pl);color:var(--pd);font-weight:500}
.admin-only{display:none}.admin-only.show{display:inline-block}
.topnav-right{display:flex;align-items:center;gap:8px;white-space:nowrap}
.user-avatar{width:30px;height:30px;border-radius:50%;border:1px solid var(--border)}
.user-name{font-size:12px;color:var(--text2);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sync-ind{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);flex-shrink:0}
.main{flex:1;padding:1.25rem;max-width:1400px;margin:0 auto;width:100%}
.panel{display:none}.panel.active{display:block}

/* Common */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:1.25rem}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl2);padding:14px 16px}
.stat-n{font-size:24px;font-weight:600;line-height:1}.stat-l{font-size:12px;color:var(--text2);margin-top:4px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl2);overflow:hidden;margin-bottom:1rem}
.card-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:14px;font-weight:500}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:8px 12px;font-size:11px;color:var(--text2);font-weight:500;border-bottom:1px solid var(--border);background:var(--bg);white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafaf8}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.b-prog{background:var(--pl);color:var(--pd)}.b-done{background:var(--gl);color:var(--gd)}
.b-wait{background:var(--al);color:var(--ad)}.b-stop{background:var(--rl);color:var(--rd)}
.b-design{background:#F0EDFB;color:#4A3FA0}.b-new{background:var(--tl);color:var(--td)}
.pend{display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;padding:0 4px;border-radius:8px;font-size:10px;font-weight:600;margin-left:3px;vertical-align:middle}
.pend-r{background:var(--rl);color:var(--rd)}.pend-g{background:var(--gl);color:var(--gd)}
.status-sel{font-size:11px;padding:2px 8px;border-radius:20px;border:none;cursor:pointer;font-family:inherit;font-weight:500}
.btn{padding:6px 14px;border-radius:var(--r);font-size:13px;cursor:pointer;font-family:inherit;font-weight:500;border:1px solid var(--border);background:var(--surface);color:var(--text)}
.btn:hover{background:var(--bg)}
.btn-p{background:var(--purple);color:#fff;border-color:var(--purple)}.btn-p:hover{background:var(--pd)}
.btn-sm{padding:3px 9px;font-size:12px}.btn-danger{background:var(--rl);color:var(--rd);border-color:var(--rl)}
input[type=text],input[type=date],select,textarea{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;font-family:inherit;background:var(--surface);color:var(--text)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--purple)}
.flex{display:flex;align-items:center;gap:8px}
.flex-sb{display:flex;align-items:center;justify-content:space-between;gap:8px}
.empty{text-align:center;padding:2rem;color:var(--text3);font-size:13px}
/* AI Assistant */
.ai-fab{position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;background:var(--purple);color:#fff;border:none;cursor:pointer;font-size:22px;box-shadow:0 4px 16px rgba(83,74,183,.4);z-index:200;display:flex;align-items:center;justify-content:center;transition:transform .15s}
.ai-fab:hover{transform:scale(1.08)}
.ai-panel{position:fixed;bottom:88px;right:24px;width:360px;max-height:520px;background:var(--surface);border:1px solid var(--border);border-radius:var(--rl2);box-shadow:0 8px 32px rgba(0,0,0,.15);z-index:200;display:flex;flex-direction:column;overflow:hidden}
.ai-header{padding:12px 16px;background:var(--purple);color:#fff;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:space-between}
.ai-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;min-height:200px}
.ai-msg-user{background:var(--pl);color:var(--pd);padding:8px 12px;border-radius:12px 12px 4px 12px;font-size:13px;align-self:flex-end;max-width:85%}
.ai-msg-ai{background:var(--bg);padding:8px 12px;border-radius:12px 12px 12px 4px;font-size:13px;align-self:flex-start;max-width:85%;line-height:1.5}
.ai-input-row{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:8px}
.ai-input{flex:1;padding:7px 10px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;font-family:inherit;resize:none;outline:none}
.ai-input:focus{border-color:var(--purple)}
.ai-send{padding:7px 14px;background:var(--purple);color:#fff;border:none;border-radius:var(--r);cursor:pointer;font-size:13px;font-family:inherit;font-weight:500}
.ai-send:hover{background:var(--pd)}
.ai-send:disabled{opacity:.5;cursor:not-allowed}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}

/* Design Progress */
.design-proj-row{border:1px solid var(--border);border-radius:var(--rl2);margin-bottom:8px;overflow:hidden}
.design-proj-hdr{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;background:var(--surface);user-select:none}
.design-proj-hdr:hover{background:var(--bg)}
.design-proj-arrow{font-size:12px;transition:transform .2s;flex-shrink:0;color:var(--text3)}
.design-proj-arrow.open{transform:rotate(90deg)}
.design-proj-name{font-size:13px;font-weight:500;flex:1}
.design-warn{font-size:11px;color:var(--rd);margin-left:4px}
/* Sub-section for each field group */
.design-fields-row{border-top:1px solid var(--border);display:none}
.design-fields-row.open{display:block}
.design-fields-hdr{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;background:var(--bg);user-select:none}
.design-fields-hdr:hover{background:#f0eeec}
.design-fields-arrow{font-size:11px;transition:transform .2s;color:var(--text3)}
.design-fields-arrow.open{transform:rotate(90deg)}
.design-fields-body{display:none;overflow-x:auto;border-top:1px solid var(--border)}
.design-fields-body.open{display:block}
.design-tbl{width:100%;border-collapse:collapse;table-layout:fixed}
.design-tbl th{padding:7px 10px;background:var(--bg);border:1px solid var(--border);font-weight:500;font-size:11px;color:var(--text2);text-align:center;white-space:nowrap;position:relative;min-width:80px}
.design-tbl th .col-resize{position:absolute;right:0;top:0;bottom:0;width:5px;cursor:col-resize}
.design-tbl th .col-resize:hover{background:var(--purple);opacity:.3}
.design-tbl th input.col-name-edit{border:none;background:transparent;font-size:11px;font-weight:500;color:var(--text2);width:calc(100% - 10px);text-align:center;font-family:inherit;padding:0}
.design-tbl th input.col-name-edit:focus{outline:none;background:var(--pl)}
.design-tbl td{border:1px solid var(--border);padding:0}
.design-tbl td input{border:none;padding:6px 8px;font-size:12px;width:100%;background:transparent;font-family:inherit}
.design-tbl td input:focus{outline:none;background:var(--pl)}
.design-tbl td.empty-cell{background:#fff8f8}

/* Week view */
.wctrl{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.seg{display:flex;gap:2px;background:var(--border);border-radius:var(--r);padding:2px}
.seg button{padding:5px 12px;font-size:12px;border:none;background:none;cursor:pointer;border-radius:6px;color:var(--text2);font-family:inherit;font-weight:500}
.seg button.on{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.nav-row{display:flex;align-items:center;gap:6px}
.nav-btn{width:28px;height:28px;border:1px solid var(--border);background:var(--surface);border-radius:var(--r);cursor:pointer;font-size:14px;color:var(--text2);display:flex;align-items:center;justify-content:center}
.nav-btn:hover{background:var(--bg)}
.wk-lbl{font-size:13px;font-weight:500;min-width:150px;text-align:center;cursor:pointer;padding:4px 8px;border-radius:var(--r)}
.wk-lbl:hover{background:var(--bg)}
.wtbl-wrap{overflow:auto;max-height:calc(100vh - 180px);border:1px solid var(--border);border-radius:var(--rl2)}
.wtbl{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed;min-width:700px}
.wtbl th{padding:6px 4px;text-align:center;font-size:11px;color:var(--text2);border-bottom:1px solid var(--border);background:var(--bg);font-weight:500;position:sticky;top:0;z-index:10}
.wtbl th:first-child{position:sticky;left:0;top:0;z-index:15;background:var(--bg)}
.wtbl td{padding:3px;border:1px solid var(--border);vertical-align:top;background:var(--surface)}
.wtbl td.ev-cell{height:50px;overflow:visible}
.formula-bar{display:none;align-items:center;gap:8px;padding:5px 10px;background:#fff;border:1px solid var(--border);border-bottom:2px solid var(--purple);margin-bottom:8px;border-radius:var(--r)}
.formula-bar.active{display:flex}
.formula-bar-label{font-size:11px;color:var(--text2);white-space:nowrap;min-width:80px}
.formula-bar-input{flex:1;border:none;background:transparent;font-size:13px;font-family:inherit;outline:none;color:var(--text)}
.wtbl td.tc{background:#faf9ff}
.wtbl th.th-t{color:var(--purple);font-weight:600}
.site-hd{background:var(--bg)!important;font-size:12px;font-weight:500;padding:8px 10px!important;vertical-align:middle;width:100px;position:sticky;left:0;z-index:5;border-right:2px solid var(--border)}

/* Event */
.ev-row{display:flex;align-items:center;gap:2px;margin-bottom:2px}
.ev-row:hover .ev-del{opacity:.6}
.ev-field{font-size:11px;cursor:text;padding:2px 4px;border-radius:3px;min-width:20px;line-height:1.5;background:rgba(255,255,255,.6);color:inherit}
.ev-field:hover{background:rgba(255,255,255,.9)}
.ev-field[contenteditable=true]{outline:1.5px solid rgba(0,0,0,.2);background:#fff;min-width:44px}
.ev-chip{display:inline-flex;align-items:center;padding:2px 7px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0}
.ev-chip:hover{opacity:.85}
.ev-chip.sel{outline:2px solid var(--purple);outline-offset:1px}
.ev-del{opacity:0;font-size:11px;padding:1px 3px;cursor:pointer;border:none;background:none;color:inherit;line-height:1;flex-shrink:0}
.ev-del:hover{opacity:1!important}
.add-ev-wrap{position:relative;display:inline-block}
.add-ev-btn{color:var(--text3);font-size:11px;padding:2px 5px;cursor:pointer;display:inline-block;border-radius:3px;user-select:none}
.add-ev-btn:hover{color:var(--purple);background:var(--pl)}

/* Stage search popup - opens UP */
.stage-search-box{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:0 4px 16px rgba(0,0,0,.15);min-width:170px;z-index:500}
.stage-search-input{width:100%;padding:6px 10px;border:none;border-bottom:1px solid var(--border);font-size:12px;font-family:inherit;border-radius:var(--r) var(--r) 0 0;outline:none}
.stage-search-input:focus{background:var(--pl)}
.stage-search-list{max-height:150px;overflow-y:auto}
.stage-search-item{padding:6px 12px;font-size:12px;cursor:pointer;border-bottom:1px solid var(--border)}
.stage-search-item:last-child{border-bottom:none}
.stage-search-item:hover,.stage-search-item.hi{background:var(--pl);color:var(--pd)}

/* Daily log section */
.daily-section{margin-top:1rem;border:1px solid var(--border);border-radius:var(--rl2);overflow:hidden}
.daily-section-hdr{padding:10px 16px;background:var(--bg);font-size:13px;font-weight:500;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.daily-log-table{width:100%;border-collapse:collapse;table-layout:fixed;min-width:700px}
.daily-log-table th{padding:6px 4px;text-align:center;font-size:11px;color:var(--text2);border-bottom:1px solid var(--border);background:var(--bg);font-weight:500;position:sticky;top:0;z-index:10}
.daily-log-table th:first-child{position:sticky;left:0;top:0;z-index:15;background:var(--bg)}
.daily-log-table td{padding:3px;border:1px solid var(--border);background:var(--surface);vertical-align:top}
.daily-log-table td.log-name-cell{background:var(--bg);font-size:12px;font-weight:500;padding:6px 10px;position:sticky;left:0;z-index:5;border-right:2px solid var(--border);width:100px}
.log-textarea{width:100%;height:80px;border:none;resize:none;font-size:11px;font-family:inherit;padding:4px 6px;background:transparent;color:var(--text);line-height:1.4}
.log-textarea:focus{outline:none;background:#faf9ff}
.log-textarea.today{background:#faf9ff}

/* Private todo */
.private-section{margin-top:0;border:1px solid var(--border);border-radius:0 0 var(--rl2) var(--rl2);overflow:hidden}
.private-section-hdr{padding:10px 16px;background:#fff8f8;font-size:13px;font-weight:500;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.private-todo-wrap{overflow-x:auto}
.private-todo-table{width:100%;border-collapse:collapse;table-layout:fixed;min-width:700px}
.private-todo-table th{padding:6px 4px;text-align:center;font-size:11px;color:var(--text2);border-bottom:1px solid var(--border);background:var(--bg);font-weight:500;position:sticky;top:0;z-index:10}
.private-todo-table th:first-child{position:sticky;left:0;top:0;z-index:15;background:var(--bg)}
.private-todo-table td{border:1px solid var(--border);vertical-align:top;background:var(--surface);padding:4px}
.private-todo-table td.ptd-label{background:var(--bg);font-size:12px;font-weight:500;padding:6px 10px;position:sticky;left:0;z-index:5;border-right:2px solid var(--border);width:100px}
.ptd-item{margin-bottom:4px}
.ptd-add-btn{font-size:11px;color:var(--text3);cursor:pointer;padding:2px 4px;display:block;text-align:left;border:none;background:none;font-family:inherit}
.ptd-add-btn:hover{color:var(--purple)}
.pn-chip{transition:opacity .1s}
.pn-chip:hover{opacity:.85}
.pn-chip-sel{box-shadow:0 0 0 2px var(--purple)!important}
.private-divider{border-top:3px solid #1a1a1a;margin:0}
.ptd-color-dots{display:flex;gap:3px;margin-top:2px;flex-wrap:wrap}
.ptd-color-dot{width:12px;height:12px;border-radius:50%;cursor:pointer;border:1px solid rgba(0,0,0,.15);flex-shrink:0;transition:transform .1s}
.ptd-color-dot:hover{transform:scale(1.3)}
.ptd-color-dot.active{outline:2px solid #333;outline-offset:1px}

/* Bible */
.bible-wrap{display:grid;grid-template-columns:240px 1fr;gap:1rem;min-height:500px}
.bible-stages{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl2);overflow:hidden}
.bst-item{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;cursor:pointer}
.bst-item:last-child{border-bottom:none}
.bst-item:hover{background:var(--bg)}
.bst-item.active{background:var(--pl);color:var(--pd);font-weight:500}
.bst-item.drag-enabled{cursor:grab}
.bst-item.dragging{opacity:.4}
.bst-item.drag-over{border-top:2px solid var(--purple)}
.drag-handle{color:var(--text3);font-size:14px;flex-shrink:0;display:none}
.drag-mode .drag-handle{display:inline}
.bst-name{flex:1;font-size:12px}
.bst-cnt{font-size:10px;background:var(--bg);color:var(--text2);padding:1px 6px;border-radius:10px;flex-shrink:0}
.bible-detail{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl2);padding:16px}
.phase-section{margin-bottom:16px}
.phase-title{font-size:11px;font-weight:600;letter-spacing:.5px;padding:6px 0;border-bottom:2px solid var(--border);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.phase-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.bib-item-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)}
.bib-item-row:last-child{border-bottom:none}
.bib-item-num{font-size:11px;color:var(--text3);min-width:22px}
.bib-item-text{flex:1;font-size:13px}
.bib-item-del{color:var(--text3);cursor:pointer;font-size:15px;padding:0 4px;border:none;background:none}
.bib-item-del:hover{color:var(--red)}
.bib-add-row{display:flex;gap:8px;margin-top:8px}
.ws-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.ws-tab{padding:4px 12px;font-size:12px;border:1px solid var(--border);border-radius:20px;cursor:pointer;background:none;font-family:inherit;color:var(--text2)}
.ws-tab.active{background:var(--pl);color:var(--pd);border-color:var(--pl)}
.ws-cl-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.ws-cl-item:last-child{border-bottom:none}
.ws-cl-item input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:var(--purple);flex-shrink:0}
.ws-cl-item label{font-size:13px;cursor:pointer;flex:1;line-height:1.4}
.ws-cl-item.done label{text-decoration:line-through;color:var(--text3)}

/* Members */
.member-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl2);padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.member-avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0}
.member-info{flex:1;min-width:120px}
.member-name{font-size:13px;font-weight:500}
.member-email{font-size:11px;color:var(--text2)}
.role-badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500}
.role-admin{background:var(--pl);color:var(--pd)}
.role-staff{background:var(--gl);color:var(--gd)}
.role-pending{background:var(--al);color:var(--ad)}

/* Modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:300;padding:1rem}
.mo-box{background:var(--surface);border-radius:var(--rl2);padding:20px;width:100%;max-width:440px;max-height:88vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.mo-title{font-size:15px;font-weight:600;margin-bottom:4px}
.mo-sub{font-size:12px;color:var(--text2);margin-bottom:12px}
.mo-footer{margin-top:14px;display:flex;gap:8px;justify-content:flex-end}
.pb-wrap{background:var(--bg);border-radius:4px;height:4px;margin-bottom:12px}
.pb-fill{height:4px;border-radius:4px}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">空間<span>總控</span></div>
    <div class="login-sub">室內設計案件管理系統</div>
    <button class="google-btn" onclick="signInWithGoogle()">
      <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      使用 Google 帳號登入
    </button>
  </div>
</div>

<div id="pending-screen">
  <div class="pending-box">
    <div style="font-size:40px;margin-bottom:16px">⏳</div>
    <div style="font-size:16px;font-weight:600;margin-bottom:8px">等待主管審核</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:20px">帳號已送出申請，請等待主管核准</div>
    <div id="pending-email" style="font-size:12px;color:var(--text3);margin-bottom:20px"></div>
    <button class="btn" onclick="signOut()">登出</button>
  </div>
</div>

<div id="app-screen">
<div class="app">
  <nav class="topnav">
    <div class="logo">空間<span>總控</span></div>
    <div class="nav-tabs">
      <button class="nav-tab active" data-tab="overview">案件總覽</button>
      <button class="nav-tab" data-tab="design">設計進度</button>
      <button class="nav-tab" data-tab="progress">工程進度</button>

      <div class="sync-ind"><div class="sync-dot" id="sdot"></div><span id="slbl">連線中</span></div>

      <button class="btn btn-sm" onclick="signOut()">登出</button>
    </div>
  </nav>
  <main class="main">
    <div id="panel-overview" class="panel active"></div>
    <div id="panel-design" class="panel"></div>
    <div id="panel-progress" class="panel"></div>
    <div id="panel-bible" class="panel"></div>
    <div id="panel-members" class="panel"></div>
  </main>
</div>
</div>

<!-- AI Assistant -->
<button class="ai-fab" id="ai-fab" onclick="toggleAI()" title="AI 助理">🤖</button>
<div class="ai-panel" id="ai-panel" style="display:none">
  <div class="ai-header">
    <span>🤖 AI 助理</span>
    <button onclick="toggleAI()" style="background:none;border:none;color:#fff;cursor:pointer;font-size:16px">✕</button>
  </div>
  <div class="ai-messages" id="ai-messages">
    <div class="ai-msg-ai">你好！我是空間總控的 AI 助理。你可以問我關於案件、工程進度或施工相關的問題！</div>
  </div>
  <div class="ai-input-row">
    <textarea class="ai-input" id="ai-input" rows="2" placeholder="輸入問題…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendAI();}"></textarea>
    <button class="ai-send" id="ai-send" onclick="sendAI()">送出</button>
  </div>
</div>

<div id="modal" class="mo" style="display:none" onclick="closeMo()">
  <div class="mo-box" onclick="event.stopPropagation()" id="mo-content"></div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/11.9.0/firebase-app.js";
import{getFirestore,collection,doc,addDoc,updateDoc,deleteDoc,setDoc,getDoc,onSnapshot,serverTimestamp,getDocs,writeBatch,query,where}from"https://www.gstatic.com/firebasejs/11.9.0/firebase-firestore.js";
import{getAuth,GoogleAuthProvider,signInWithPopup,signOut as fbSignOut,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/11.9.0/firebase-auth.js";

const FC={apiKey:"AIzaSyA6W_C2H84heiVwDe_a6ElMwuEjvbR0aRo",authDomain:"have000.firebaseapp.com",projectId:"have000",storageBucket:"have000.firebasestorage.app",messagingSenderId:"758420593792",appId:"1:758420593792:web:29f485e949eca0ce031a65"};
const app=initializeApp(FC);
const db=getFirestore(app);
const auth=getAuth(app);
const provider=new GoogleAuthProvider();

let currentUser=null,currentRole=null;
let S={projects:[],checks:{},bible:{},bibleOrder:[],members:[],dailyLogs:{},privateNotes:{work:{},personal:{}},dateColors:{},meetingLogs:{},taskList:[]};
const MEETING_ROWS=[
  {id:'meet1',name:'客戶會議/丈量'},
  {id:'meet2',name:'廠商會議'},
  {id:'meet3',name:'丈量'},
  {id:'meet4',name:'其他'}
];
let activePanel='overview',calMode='week',weekOffset=0,selectedTag=null;
let activeBibleStage=null,activeBibleWs=null,bibleView='edit',dragSrc=null,dragModeOn=false;
let openPicker=null;
let expandedProjs={},expandedFields={};
let designCols=null;
let designBlueColsOpen={};

const $=id=>document.getElementById(id);
const STATUS_OPTS=[
  {v:'design',l:'設計中',bg:'#F0EDFB',color:'#4A3FA0'},
  {v:'prog',l:'施工中',bg:'var(--pl)',color:'var(--pd)'},
  {v:'wait',l:'待確認',bg:'var(--al)',color:'var(--ad)'},
  {v:'done',l:'已完工',bg:'var(--gl)',color:'var(--gd)'},
  {v:'stop',l:'暫停',bg:'var(--rl)',color:'var(--rd)'},
];
const SCOLS=["#EEEDFE","#E1F5EE","#FAEEDA","#FCEBEB","#E6F1FB","#EAF3DE","#FBEAF0","#F1EFE8"];
const STCS=["#3C3489","#085041","#633806","#791F1F","#0C447C","#27500A","#72243E","#444441"];
function sc(i){return SCOLS[i%SCOLS.length]}function tc(i){return STCS[i%STCS.length]}
function statusInfo(v){return STATUS_OPTS.find(o=>o.v===v)||STATUS_OPTS[0]}
function isAdmin(){return currentRole==='admin'}
function memberDisplayName(m){if(!m)return'成員';return m.displayName||m.name||(m.email?m.email.split('@')[0]:'成員');}
function memberTag(m){if(!m)return'?';if(m.tagInitial)return m.tagInitial;return memberDisplayName(m).charAt(0);}
function activeMembersList(){return S.members.filter(m=>(m.role==='admin'||m.role==='staff')&&m.status!=='resigned');}
const DEFAULT_DESIGN_COL_NAMES=['會議人員','平面圖','客變圖','3D圖','施工圖','報價單'];
const DEFAULT_DESIGN_COLS=[
  ...DEFAULT_DESIGN_COL_NAMES.map(name=>({name,kind:'member',collapsible:true})),
  ...Array.from({length:9},(_,i)=>({name:String(i+1),kind:'text',collapsible:false}))
];
// Accepts either the old plain-string column list or the new {name,kind,collapsible}
// shape, and always returns the new shape — so existing saved data keeps working.
function getDesignCols(){
  const raw=designCols||DEFAULT_DESIGN_COLS;
  return raw.map(c=>typeof c==='string'?{name:c,kind:DEFAULT_DESIGN_COL_NAMES.includes(c)?'member':'text',collapsible:DEFAULT_DESIGN_COL_NAMES.includes(c)}:c);
}

function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r}
function isSameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate()}
function fmtDate(d){return`${d.getMonth()+1}/${d.getDate()}`}
function fmtDay(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function today(){return new Date()}
function getWeekDates(){const b=today();const dow=b.getDay();const diff=dow===0?-6:1-dow;const mon=addDays(b,diff+weekOffset*7);return Array.from({length:7},(_,i)=>addDays(mon,i));}

function getBibleStages(){
  if(S.bibleOrder&&S.bibleOrder.length)return S.bibleOrder;
  return Object.keys(S.bible).filter(k=>k!=='__order__');
}
function getBiblePhaseItems(stage,phase){const b=S.bible[stage];return(b&&b[phase])?b[phase]:[];}
function getAllBibleItems(stage){const b=S.bible[stage]||{before:[],during:[],after:[]};return[...(b.before||[]),...(b.during||[]),...(b.after||[])];}
function pendingCount(projId,stage){
  if(!stage)return null;
  const items=getAllBibleItems(stage);if(!items.length)return null;
  const stored=S.checks[`${projId}_${stage}`]||[];
  return items.length-items.filter((_,i)=>stored[i]?.done).length;
}
function pendBadge(n){
  if(n===null)return'';
  if(n===0)return`<span class="pend pend-g">✓</span>`;
  return`<span class="pend pend-r">${n}</span>`;
}
function setSynced(){$('sdot').style.background='#1D9E75';$('slbl').textContent='已同步'}
function setSyncing(){$('sdot').style.background='var(--amber)';$('slbl').textContent='同步中'}
function setOffline(){$('sdot').style.background='var(--red)';$('slbl').textContent='離線'}

// ── Auth ──
window.signInWithGoogle=async function(){
  try{await signInWithPopup(auth,provider);}catch(e){alert('登入失敗：'+e.message);}
}
window.signOut=async function(){await fbSignOut(auth);location.reload();}

onAuthStateChanged(auth,async user=>{
  if(!user){
    $('login-screen').style.display='flex';
    $('pending-screen').style.display='none';
    $('app-screen').style.display='none';
    return;
  }
  currentUser=user;
  const memberRef=doc(db,'members',user.uid);
  const memberSnap=await getDoc(memberRef);
  let memberData;
  if(!memberSnap.exists()){
    const membersSnap=await getDocs(collection(db,'members'));
    const hasAdmin=membersSnap.docs.some(d=>d.data().role==='admin');
    const role=hasAdmin?'pending':'admin';
    memberData={uid:user.uid,name:user.displayName,email:user.email,photoURL:user.photoURL,role,status:'active',createdAt:serverTimestamp()};
    await setDoc(memberRef,memberData);
    currentRole=role;
  }else{
    memberData=memberSnap.data();
    currentRole=memberData.role;
  }
  if(memberData.status==='resigned'){
    await fbSignOut(auth);
    $('login-screen').style.display='flex';
    $('pending-screen').style.display='none';
    $('app-screen').style.display='none';
    alert('此帳號已被設定為離職，無法登入。如有疑問請聯絡主管。');
    return;
  }
  if(currentRole==='pending'){
    $('login-screen').style.display='none';
    $('pending-screen').style.display='flex';
    $('app-screen').style.display='none';
    $('pending-email').textContent=user.email;
    return;
  }
  $('login-screen').style.display='none';
  $('pending-screen').style.display='none';
  $('app-screen').style.display='block';
  if(user.photoURL){$('user-avatar').src=user.photoURL;$('user-avatar').style.display='block';}
  $('user-name').textContent=memberDisplayName(memberData);
  if(isAdmin())document.querySelectorAll('.admin-only').forEach(el=>el.classList.add('show'));
  initListeners();renderOverview();

});

// ── AI Assistant ──
var aiOpen=false;
window.toggleAI=function(){
  aiOpen=!aiOpen;
  var panel=document.getElementById('ai-panel');
  if(panel)panel.style.display=aiOpen?'flex':'none';
  if(aiOpen){setTimeout(function(){var inp=document.getElementById('ai-input');if(inp)inp.focus();},100);}
}
window.sendAI=async function(){
  var inp=document.getElementById('ai-input');
  var msgs=document.getElementById('ai-messages');
  var btn=document.getElementById('ai-send');
  if(!inp||!msgs)return;
  var q=inp.value.trim();if(!q)return;
  inp.value='';btn.disabled=true;
  var userDiv=document.createElement('div');
  userDiv.className='ai-msg-user';userDiv.textContent=q;
  msgs.appendChild(userDiv);
  var loadDiv=document.createElement('div');
  loadDiv.className='ai-msg-ai';loadDiv.textContent='思考中…';
  msgs.appendChild(loadDiv);
  msgs.scrollTop=msgs.scrollHeight;
  var projList=S.projects.map(function(p){return p.name+'（'+({design:'設計中',prog:'施工中',done:'已完工',wait:'待確認',stop:'暫停'}[p.status]||p.status)+'）';}).join('、');
  var stageList=Object.keys(S.bible||{}).filter(function(k){return k!=='__order__';}).join('、');
  var systemPrompt='你是一個室內設計公司的專案管理 AI 助理，請用繁體中文回答。\n目前系統資料：\n【案件列表】'+projList+'\n【施工寶典階段】'+(stageList||'尚無')+'。\n請根據以上資料回答，若問題與資料無關也可提供室內設計相關建議。';
  try{
    var resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,system:systemPrompt,messages:[{role:'user',content:q}]})
    });
    var data=await resp.json();
    var answer=(data.content&&data.content[0]&&data.content[0].text)||'抱歉，無法取得回應';
    loadDiv.textContent=answer;
  }catch(err){loadDiv.textContent='連線發生問題，請稍後再試';}
  btn.disabled=false;
  msgs.scrollTop=msgs.scrollHeight;
}

function initListeners(){
  onSnapshot(collection(db,'projects'),snap=>{S.projects=snap.docs.map(d=>({id:d.id,...d.data()}));renderActive();setSynced();},()=>setOffline());
  onSnapshot(collection(db,'checks'),snap=>{S.checks={};snap.docs.forEach(d=>{S.checks[d.id]=d.data().items||[]});renderActive();});
  onSnapshot(collection(db,'bible'),snap=>{
    S.bible={};S.bibleOrder=[];
    snap.docs.forEach(d=>{if(d.id==='__order__'){S.bibleOrder=d.data().order||[];}else{S.bible[d.id]=d.data();}});
    const allStages=Object.keys(S.bible).filter(k=>k!=='__order__');
    allStages.forEach(s=>{if(!S.bibleOrder.includes(s))S.bibleOrder.push(s);});
    renderActive();
  });
  onSnapshot(collection(db,'members'),snap=>{S.members=snap.docs.map(d=>({id:d.id,...d.data()}));renderActive();});
  onSnapshot(doc(db,'settings','designCols'),snap=>{
    designCols=snap.exists()?(snap.data().cols||DEFAULT_DESIGN_COLS):DEFAULT_DESIGN_COLS;
    renderActive();
  });
  onSnapshot(doc(db,'settings','dateColors'),snap=>{
    S.dateColors=snap.exists()?(snap.data().colors||{}):{};
    if(activePanel==='progress')renderProgress();
  });
  // Daily logs: shared, keyed by date
  onSnapshot(collection(db,'dailyLogs'),snap=>{
    S.dailyLogs={};
    snap.docs.forEach(d=>{S.dailyLogs[d.id]=d.data();});
    if(activePanel==='progress')renderProgress();
  });
  onSnapshot(collection(db,'meetingLogs'),snap=>{
    S.meetingLogs={};
    snap.docs.forEach(d=>{S.meetingLogs[d.id]=d.data();});
    if(activePanel==='progress')renderProgress();
  });
  onSnapshot(collection(db,'taskAssignments'),snap=>{
    S.taskList=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(activePanel==='progress')renderProgress();
  });
  // Private notes: per user
  if(currentUser){
    onSnapshot(doc(db,'privateNotes',currentUser.uid),snap=>{
      S.privateNotes=snap.exists()?snap.data():{work:{},personal:{}};
      if(activePanel==='progress')renderProgress();
    });
  }
}

document.querySelectorAll('.nav-tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.nav-tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');activePanel=t.dataset.tab;
    $(`panel-${activePanel}`).classList.add('active');renderActive();
  });
});
function renderActive(){
  if(activePanel==='overview')renderOverview();
  else if(activePanel==='design')renderDesign();
  else if(activePanel==='progress')renderProgress();
  else if(activePanel==='bible')renderBible();
  else if(activePanel==='members')renderMembers();
}

// ── Overview ──
function renderOverview(){
  const el=$('panel-overview');
  const inDesign=S.projects.filter(p=>p.status==='design').length;
  const inProg=S.projects.filter(p=>p.status==='prog').length;
  const done=S.projects.filter(p=>p.status==='done').length;
  el.innerHTML=`
  <div class="stats">
    <div class="stat"><div class="stat-n" style="color:#4A3FA0">${inDesign}</div><div class="stat-l">設計中</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--purple)">${inProg}</div><div class="stat-l">施工中</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--green)">${done}</div><div class="stat-l">已完工</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--red)">${S.members.filter(m=>m.role==='pending').length}</div><div class="stat-l">待審核</div></div>
  </div>
  <div class="card">
    <div class="card-hdr"><span class="card-title">所有案件</span>
      ${isAdmin()?`<button class="btn btn-p btn-sm" onclick="showAddProject()">＋ 新增案件</button>`:''}
    </div>
    ${S.projects.length===0?`<div class="empty">尚無案件</div>`:`
    <div style="overflow-x:auto"><table>
      <thead><tr><th>案件名稱</th><th>業主</th><th>類型</th><th>設計師</th><th>預算</th><th>完工日</th><th>狀態</th>${isAdmin()?'<th></th>':''}</tr></thead>
      <tbody>${S.projects.map(p=>{
        const si=statusInfo(p.status);
        return`<tr>
          <td><strong style="font-weight:500">${p.name}</strong></td>
          <td>${p.owner||''}</td><td style="color:var(--text2)">${p.type||''}</td>
          <td>${p.designer||''}</td><td>${p.budget||''}</td>
          <td style="color:var(--text2)">${p.finish||''}</td>
          <td>${isAdmin()?`<select class="status-sel" style="background:${si.bg};color:${si.color}" onchange="updateStatus('${p.id}',this.value)">
            ${STATUS_OPTS.map(o=>`<option value="${o.v}" ${p.status===o.v?'selected':''}>${o.l}</option>`).join('')}
          </select>`:`<span class="badge" style="background:${si.bg};color:${si.color}">${si.l}</span>`}</td>
          ${isAdmin()?`<td><button class="btn btn-sm" onclick="deleteProject('${p.id}')">刪除</button></td>`:''}
        </tr>`;}).join('')}</tbody>
    </table></div>`}
  </div>`;
}
window.updateStatus=async function(projId,v){setSyncing();await updateDoc(doc(db,'projects',projId),{status:v});setSynced();}

// ── Design ──
function renderDesign(){
  const el=$('panel-design');
  const cols=getDesignCols();
  const allProjs=S.projects.filter(p=>['design','prog','wait'].includes(p.status));
  el.innerHTML=`
  <div class="flex-sb" style="margin-bottom:1rem">
    <span style="font-size:14px;font-weight:500">設計進度</span>
    <span style="display:flex;gap:8px">
      ${isAdmin()?`<button class="btn btn-sm" onclick="openDesignColSettings()">⚙ 欄位設定</button>`:''}
    </span>
  </div>
  ${allProjs.length===0?`<div class="empty">尚無案件</div>`:''}
  ${allProjs.map(p=>{
    const dp=p.designProgress||{};
    const missingCount=cols.filter(c=>!dp[c.name]||(''+dp[c.name]).trim()==='').length;
    const hasCollapsible=cols.some(c=>c.collapsible);
    const isOpen=!!designBlueColsOpen[p.id];
    const visCols=cols.filter(c=>!c.collapsible||isOpen);
    return`<div class="design-proj-row">
      <div class="design-proj-hdr" style="cursor:default">
        ${hasCollapsible?`<span onclick="toggleDesignBlueCols('${p.id}')" title="顯示/隱藏標記欄位（會議人員等）" style="cursor:pointer;font-size:11px;color:var(--purple);transform:rotate(${isOpen?90:0}deg);transition:transform .15s;display:inline-block">▶</span>`:''}
        <span class="design-proj-name">${p.name}</span>
        ${missingCount>0?`<span class="design-warn">⚠ ${missingCount} 項未填</span>`:`<span style="font-size:11px;color:var(--teal)">✓ 已填齊</span>`}
        <span style="font-size:11px;color:var(--text3)">${statusInfo(p.status).l}</span>
      </div>
      <div style="overflow-x:auto">
      <table class="design-tbl" id="dtbl-${p.id}">
        <thead><tr>
          ${visCols.map(c=>{const ci=cols.indexOf(c);return`<th style="width:${p.colWidths?.[ci]||120}px">
            ${isAdmin()?`<input class="col-name-edit" value="${c.name}" onblur="saveColName(${ci},this.value)" onkeydown="if(event.key==='Enter')this.blur()">`:`<span>${c.name}</span>`}
            ${isAdmin()?`<div class="col-resize" onmousedown="startColResize(event,'${p.id}',${ci})"></div>`:''}
          </th>`;}).join('')}
        </tr></thead>
        <tbody><tr>

window.dcHashCheck=function(el,projId,colName){
  const val=el.value||'';
  const pos=el.selectionStart||0;
  const textBefore=val.substring(0,pos);
  const hIdx=textBefore.lastIndexOf('#');
  const menuEl=document.getElementById('dc-hash-'+projId+'-'+colName);
  if(!menuEl)return;
  if(hIdx>=0&&textBefore.indexOf(' ',hIdx)<0){
    const q=textBefore.substring(hIdx+1).toLowerCase();
    const matches=getBibleStages().filter(s=>s.toLowerCase().includes(q));
    if(matches.length){
      const rect=el.getBoundingClientRect();
      menuEl.style.cssText='display:block;position:fixed;top:'+(rect.bottom+4)+'px;left:'+rect.left+'px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:0 4px 12px rgba(0,0,0,.12);z-index:500;min-width:140px;max-height:200px;overflow-y:auto';
      menuEl.innerHTML=matches.map(s=>'<div onmousedown="event.preventDefault();dcPickStage(\''+projId+'\',\''+colName+'\',\''+s+'\')" style="padding:7px 12px;font-size:12px;cursor:pointer;border-bottom:1px solid var(--border)">#'+s+'</div>').join('');

let resizing=null;
window.startColResize=function(e,projId,ci){
  e.preventDefault();
  const startX=e.clientX;
  const proj=S.projects.find(p=>p.id===projId);
  const startW=(proj?.colWidths?.[ci])||120;
  resizing={projId,ci,startX,startW};
  document.onmousemove=function(me){
    if(!resizing)return;
    const newW=Math.max(60,resizing.startW+(me.clientX-resizing.startX));
    const tbl=$(`dtbl-${resizing.projId}`);
    if(tbl){const ths=tbl.querySelectorAll('th');if(ths[resizing.ci])ths[resizing.ci].style.width=newW+'px';}
  };
  document.onmouseup=async function(){
    if(!resizing)return;
    const tbl=$(`dtbl-${resizing.projId}`);
    const proj2=S.projects.find(p=>p.id===resizing.projId);
    if(tbl&&proj2){
      const ths=tbl.querySelectorAll('th');
      const widths=Array.from(ths).map(th=>parseInt(th.style.width)||120);
      await updateDoc(doc(db,'projects',resizing.projId),{colWidths:widths});
    }
    resizing=null;document.onmousemove=null;document.onmouseup=null;
  };

var pendingProgressRender=false;
function renderProgress(){
  var af=document.activeElement;
  var menuOpen=false;
  document.querySelectorAll('.pn-mention-menu').forEach(function(el){if(el.style.display==='block')menuOpen=true;});
  if((af&&(af.classList&&af.classList.contains('pn-box-input')||af.id==='pn-formula-input'))||menuOpen){
    // User is actively typing in a private note, or has a tag-picker menu
    // open — skip this re-render so background updates (other data
    // changing) don't wipe out what they're doing. We'll catch up once
    // they're done (see pnBoxBlur / mScheduleCloseMention).
    pendingProgressRender=true;
    return;
  }
  pendingProgressRender=false;
  const el=$('panel-progress');
  const weekDays=getWeekDates();
  function shouldShow(p){
    if(p.status==='prog')return true;
    if(p.status==='done'){
      return(p.schedule||[]).some(e=>{
        const d=new Date(e.date+'T00:00:00');
        return d>=weekDays[0]&&d<=weekDays[6];
      });
    }
    return false;
  }
  el.innerHTML=`
  <div class="wctrl">
    <div class="seg">
      <button class="${calMode==='week'?'on':''}" onclick="setCalMode('week')">週視圖</button>
      <button class="${calMode==='day'?'on':''}" onclick="setCalMode('day')">今日總覽</button>
    </div>
    ${calMode==='week'?`<div class="nav-row">
      <button class="nav-btn" onclick="changeWeek(-1)">‹</button>
      <span class="wk-lbl" onclick="openDatePicker()">${weekDays[0].getFullYear()}年 ${fmtDate(weekDays[0])} – ${fmtDate(weekDays[6])} 📅</span>
      <input type="date" id="week-date-picker" style="position:fixed;opacity:0;pointer-events:none;width:0;height:0" onchange="jumpToDate(this.value)">
      <button class="nav-btn" onclick="changeWeek(1)">›</button>
    </div>`:''}
  </div>
  ${getBibleStages().length===0?`<div class="empty" style="margin-bottom:1rem">請先至「施工寶典」新增工程階段</div>`:''}
  ${calMode==='week'?`<div class="formula-bar${formulaBarState?' active':''}" id="pn-formula-bar">
    <span class="formula-bar-label" id="pn-formula-label">${formulaBarState?(formulaBarState.type==='work'?'工地記事':'私人記事')+' · '+formulaBarState.ds.slice(5).replace('-','/'):'工地記事'}</span>
    <input class="formula-bar-input" id="pn-formula-input" placeholder="選取色塊後在此編輯…" value="${formulaBarState?escAttr(formulaBarState.text||''):''}" autocomplete="off" spellcheck="false"
      oninput="if(formulaBarState)formulaBarState.text=this.value"
      onblur="formulaBarSave()"
      onkeydown="if((event.key==='Enter'||event.key==='Escape')&&!event.isComposing&&event.keyCode!==229)this.blur()">
  </div>`:''}
  ${calMode==='week'?renderWeekView(shouldShow):renderDayView()}
  ${calMode==='week'?renderDailyLogSection(weekDays):''}
  ${renderPrivateTodoSection()}`;
}

window.tSubmitNew=async function(){
  if(!currentUser)return;
  const dayInp=document.getElementById('task-new-day');
  const textInp=document.getElementById('task-new-text');
  const dayVal=dayInp?parseInt(dayInp.value,10):NaN;
  const textVal=textInp?textInp.value.trim():'';
  if(!dayVal||dayVal<1||dayVal>31||!textVal||!tNewTargets.length){
    alert('請輸入幾日、填寫任務內容，並至少標記一位人員');
    return;
  }
  const td=today();
  const dateVal=td.getFullYear()+'-'+String(td.getMonth()+1).padStart(2,'0')+'-'+String(dayVal).padStart(2,'0');
  setSyncing();

window.tRemoveTarget=async function(taskId,uid){
  if(!currentUser)return;
  const t=(S.taskList||[]).find(x=>x.id===taskId);
  if(!t||t.createdBy!==currentUser.uid)return;
  const newTargets=(t.targets||[]).filter(x=>x!==uid);
  setSyncing();
  if(newTargets.length===0){
    await deleteDoc(doc(db,'taskAssignments',taskId));
  }else{
    await setDoc(doc(db,'taskAssignments',taskId),{text:t.text,date:t.date,targets:newTargets,createdBy:t.createdBy,createdAt:t.createdAt||serverTimestamp()});
  }
  await tRemoveFromDailyLog(taskId,uid,t.date);
  setSynced();
}
async function tSyncDailyLog(taskId,uid,ds,newText){
  const m=S.members.find(x=>x.uid===uid);
  if(!m)return;
  const logKey=`${m.uid}_${ds}`;
  const cur=S.dailyLogs[logKey]||{};
  const autoLines=Object.assign({},cur.autoLines||{});
  const trackKey='task:'+taskId;
  const oldLine=autoLines[trackKey];
  let lines=(cur.text||'').split('\n').filter(l=>l!=='');
  if(oldLine!=null){
    const pos=lines.indexOf(oldLine);
    if(pos>=0)lines[pos]=newText;else lines.push(newText);
  }else{
    lines.push(newText);
  }
  autoLines[trackKey]=newText;
  try{
    await setDoc(doc(db,'dailyLogs',logKey),{uid:m.uid,date:ds,text:lines.join('\n'),autoLines,updatedAt:serverTimestamp()});
  }catch(err){
    console.error('無法自動寫入 '+memberDisplayName(m)+' 的每日日誌（可能需要調整 Firebase 權限規則）',err);
  }
}
async function tRemoveFromDailyLog(taskId,uid,ds){
  const m=S.members.find(x=>x.uid===uid);
  if(!m)return;
  const logKey=`${m.uid}_${ds}`;
  const cur=S.dailyLogs[logKey]||{};
  const autoLines=Object.assign({},cur.autoLines||{});
  const trackKey='task:'+taskId;
  const oldLine=autoLines[trackKey];
  if(oldLine==null)return;
  let lines=(cur.text||'').split('\n').filter(l=>l!=='');
  const pos=lines.indexOf(oldLine);
  if(pos>=0)lines.splice(pos,1);
  delete autoLines[trackKey];
  try{
    await setDoc(doc(db,'dailyLogs',logKey),{uid:m.uid,date:ds,text:lines.join('\n'),autoLines,updatedAt:serverTimestamp()});
  }catch(err){
    console.error('無法自動移除 '+memberDisplayName(m)+' 的每日日誌（可能需要調整 Firebase 權限規則）',err);
  }
}

window.mDragStart=function(e,rowId,ds,idx){

window.mDrop=async function(e,toRowId,toDs){
  e.preventDefault();e.stopPropagation();
  const raw=e.dataTransfer.getData('text/plain');
  let from=null;
  if(raw){const p=raw.split('|');if(p.length===4&&p[0]==='meet')from={rowId:p[1],ds:p[2],idx:parseInt(p[3])};}
  if(!from)from=meetingDragSrc;
  if(!from||!currentUser)return;
  if(from.rowId===toRowId&&from.ds===toDs){meetingDragSrc=null;return;}
  const toKey=toRowId+'_'+toDs;
  const toItems=(S.meetingLogs[toKey]&&S.meetingLogs[toKey].items)?[...S.meetingLogs[toKey].items]:[];
  if(toItems.length>=1){meetingDragSrc=null;return;} // target cell already has an entry
  const fromKey=from.rowId+'_'+from.ds;
  const fromItems=(S.meetingLogs[fromKey]&&S.meetingLogs[fromKey].items)?[...S.meetingLogs[fromKey].items]:[];
  const item=fromItems[from.idx];
  if(!item){meetingDragSrc=null;return;}
  toItems.push(Object.assign({},item));
  setSyncing();
  await setDoc(doc(db,'meetingLogs',toKey),{rowId:toRowId,date:toDs,items:toItems,updatedAt:serverTimestamp()});
  if(!e.ctrlKey){
    fromItems.splice(from.idx,1);
    await setDoc(doc(db,'meetingLogs',fromKey),{rowId:from.rowId,date:from.ds,items:fromItems,updatedAt:serverTimestamp()});
  }
  meetingDragSrc=null;
  setSynced();
}

window.mToggleMention=async function(rowId,ds,idx,uid){
  if(!currentUser)return;
  const key=rowId+'_'+ds;
  const items=(S.meetingLogs[key]&&S.meetingLogs[key].items)?[...S.meetingLogs[key].items]:[];
  if(idx<0||idx>=items.length)return;
  const mentions=(items[idx].mentions||[]).slice();
  const pos=mentions.indexOf(uid);
  const adding=pos<0;
  if(adding)mentions.push(uid);else mentions.splice(pos,1);
  items[idx]=Object.assign({},items[idx],{mentions});
  S.meetingLogs=Object.assign({},S.meetingLogs);
  S.meetingLogs[key]=Object.assign({},S.meetingLogs[key],{items});
  setSyncing();
  await setDoc(doc(db,'meetingLogs',key),{rowId,date:ds,items,updatedAt:serverTimestamp()});
  setSynced();
  if(adding)await mSyncDailyLog(rowId,ds,idx,uid,items[idx].text||'');
  else await mRemoveFromDailyLog(rowId,ds,idx,uid);
  // Refresh just the checklist (keep it open) instead of a full re-render,
  // so tagging several people doesn't require re-hovering each time.
  const menuEl=document.getElementById('meet-mention-'+rowId+'-'+ds);

}
// Upsert this meeting entry's own text as one line in the member's daily
// log, remembering exactly which line came from this entry (so editing the
// text later replaces the same line, and untagging removes the same line).
async function mSyncDailyLog(rowId,ds,idx,uid,newText){
  const m=S.members.find(x=>x.uid===uid);
  if(!m)return;
  const logKey=`${m.uid}_${ds}`;
  const cur=S.dailyLogs[logKey]||{};
  const autoLines=Object.assign({},cur.autoLines||{});
  const trackKey=rowId+'_'+idx;
  const oldLine=autoLines[trackKey];
  let lines=(cur.text||'').split('\n').filter(l=>l!=='');
  if(oldLine!=null){
    const pos=lines.indexOf(oldLine);
    if(pos>=0)lines[pos]=newText;else lines.push(newText);
  }else{
    lines.push(newText);
  }
  autoLines[trackKey]=newText;
  try{
    await setDoc(doc(db,'dailyLogs',logKey),{uid:m.uid,date:ds,text:lines.join('\n'),autoLines,updatedAt:serverTimestamp()});
  }catch(err){
    console.error('無法自動寫入 '+memberDisplayName(m)+' 的每日日誌（可能需要調整 Firebase 權限規則）',err);
  }
}
async function mRemoveFromDailyLog(rowId,ds,idx,uid){
  const m=S.members.find(x=>x.uid===uid);
  if(!m)return;
  const logKey=`${m.uid}_${ds}`;
  const cur=S.dailyLogs[logKey]||{};
  const autoLines=Object.assign({},cur.autoLines||{});
  const trackKey=rowId+'_'+idx;
  const oldLine=autoLines[trackKey];
  if(oldLine==null)return;
  let lines=(cur.text||'').split('\n').filter(l=>l!=='');
  const pos=lines.indexOf(oldLine);
  if(pos>=0)lines.splice(pos,1);
  delete autoLines[trackKey];
  try{
    await setDoc(doc(db,'dailyLogs',logKey),{uid:m.uid,date:ds,text:lines.join('\n'),autoLines,updatedAt:serverTimestamp()});
  }catch(err){
    console.error('無法自動移除 '+memberDisplayName(m)+' 的每日日誌（可能需要調整 Firebase 權限規則）',err);
  }
}
window.mBoxBlur=function(el,rowId,ds,idx){mSaveBox(el,rowId,ds,idx);}
window.mSaveBox=async function(el,rowId,ds,idx){
  if(!currentUser||!el)return;
  const text=el.value;
  const key=rowId+'_'+ds;
  const items=(S.meetingLogs[key]&&S.meetingLogs[key].items)?[...S.meetingLogs[key].items]:[];
  while(items.length<=idx)items.push({text:'',color:'',bg:'',mentions:[]});
  items[idx]=Object.assign({},items[idx],{text});
  setSyncing();
  await setDoc(doc(db,'meetingLogs',key),{rowId,date:ds,items,updatedAt:serverTimestamp()});
  // keep already-tagged members' daily logs in sync with the latest text
  const mentions=items[idx].mentions||[];
  for(const uid of mentions){
    await mSyncDailyLog(rowId,ds,idx,uid,text);
  }
  setSynced();
  const gen=meetingSelGen;
  setTimeout(function(){
    if(meetingSelGen===gen){
      meetingSelected={};
      if(activePanel==='progress')renderProgress();
    }
  },150);
}

function renderPrivateTodoSection(){
  if(calMode!=='week')return'';
  var days=getWeekDates();
  var td=today();
  var pn=S.privateNotes||{work:{},personal:{}};
  var COLS=[
    {c:'',bg:'#e8e5e0',l:'無'},
    {c:'#E24B4A',bg:'#E24B4A',l:'紅'},
    {c:'#EF9F27',bg:'#EF9F27',l:'橘'},
    {c:'#1D9E75',bg:'#1D9E75',l:'綠'},
    {c:'#534AB7',bg:'#534AB7',l:'藍'},
    {c:'#9c9690',bg:'#9c9690',l:'灰'}
  ];
  var sel=S.privateSelected||{};
  var editing=S.privateEditing||null;

  function colorBar(){
    var found=null;
    Object.keys(sel).forEach(function(k){
      if(sel[k]>=0){
        var parts=k.split('|');
        var type=parts[0],ds=parts[1];
        var items=(pn[type]&&pn[type][ds])||[];
        if(items[sel[k]])found={type:parts[0],ds:parts[1],idx:sel[k],color:items[sel[k]].color||''};
      }
    });
    var h='<span style="display:inline-flex;align-items:center;gap:4px;margin-left:10px">';
    COLS.forEach(function(col){
      var isActive=found&&found.color===col.c;
      var onclick=found?(' onclick="pnSetColor(\''+found.type+'\',\''+found.ds+'\','+found.idx+',\''+col.c+'\')"'):'';
      h+='<span style="width:16px;height:16px;border-radius:50%;background:'+col.bg+';cursor:'+(found?'pointer':'default')+';display:inline-block;border:1.5px solid rgba(0,0,0,.2);vertical-align:middle;opacity:'+(found?1:0.35)+';'+(isActive?'outline:2px solid #333;outline-offset:1px':'')+'" title="'+col.l+'"'+onclick+'></span>';
    });
    h+='</span>';
    return h;
  }

  // Render text with @mentions highlighted
  function renderText(text){
    if(!text)return'';
    return text.replace(/([\u4e00-\u9fa5A-Za-z0-9_\s]+)/g,function(match){return match;})
      .split(/(\[proj:[^\]]+\])/g).map(function(part){
        var m=part.match(/\[proj:([^\]]+)\]/);
        if(m)return'<span style="color:var(--purple);font-weight:600;background:var(--pl);padding:0 4px;border-radius:3px;font-size:10px">'+m[1]+'</span>';
        return part.replace(/</g,'&lt;').replace(/>/g,'&gt;');
      }).join('');
  }

  function makeCell(type,ds){
    var isT=isSameDay(new Date(ds+'T00:00:00'),td);
    var items=(pn[type]&&pn[type][ds])||[];
    var selKey=type+'|'+ds;
    var selIdx=(sel[selKey]!=null)?sel[selKey]:-1;
    var h='<td style="vertical-align:top;padding:4px;border:1px solid var(--border);'+(isT?'background:#fff8f8':'')+'" ondragover="event.preventDefault()" ondrop="pnDrop(event,\''+type+'\',\''+ds+'\')">';
    items.forEach(function(item,i){
      var color=item.color||'';
      var isSel=selIdx===i;
      var isEdit=editing&&editing.type===type&&editing.ds===ds&&editing.idx===i;
      var border=isSel?'2px solid var(--purple)':'1.5px solid var(--border)';
      var textStyle=color?'color:'+color+';font-weight:500':'color:var(--text)';
      // Chip height matches add button
      if(isSel){
        h+='<input type="text" class="pn-box-input pn-chip" id="pnbox-'+type+'-'+ds+'-'+i+'" value="'+escAttr(item.text||'')+'" autocomplete="off" spellcheck="false"'
          +' style="width:100%;box-sizing:border-box;background:var(--surface);border:'+border+';padding:6px 8px;border-radius:5px;font-size:12px;margin-bottom:4px;min-height:30px;line-height:1.4;font-family:inherit;'+textStyle+'"'
          +' oninput="if(formulaBarState)formulaBarState.text=this.value"'
          +' onblur="pnBoxBlur(this,\''+type+'\',\''+ds+'\','+i+')"'
          +' onkeydown="if((event.key===\'Enter\'||event.key===\'Escape\')&&!event.isComposing&&event.keyCode!==229)this.blur()"'
          +' onclick="event.stopPropagation()"'
          +'>';
      }else{
        h+='<div class="pn-chip" style="background:var(--surface);border:'+border+';padding:6px 8px;border-radius:5px;font-size:12px;margin-bottom:4px;cursor:pointer;user-select:none;min-height:30px;line-height:1.4;position:relative;'+textStyle+'"'
          +' onclick="pnSelect(\''+type+'\',\''+ds+'\','+i+')"'
          +' draggable="true"'
          +' ondragstart="pnDragStart(event,\''+type+'\',\''+ds+'\','+i+')"'
          +'>';
        h+=renderText(item.text||'');
        h+='</div>';
      }
    });
    h+='<button style="font-size:12px;padding:6px 8px;border:1px dashed var(--border);background:none;cursor:pointer;color:var(--text3);width:100%;text-align:left;margin-top:2px;border-radius:5px;font-family:inherit;min-height:30px" onclick="pnAdd(\''+type+'\',\''+ds+'\')">＋ 新增</button>';
    h+='</td>';
    return h;
  }

  function makeRow(type,label){
    var h='<tr><td class="log-name-cell" style="font-size:11px;color:var(--text2)">'+label+'</td>';
    days.forEach(function(d){h+=makeCell(type,fmtDay(d));});
    h+='</tr>';
    return h;
  }

  var hiddenHeader='<tr style="height:0;visibility:hidden"><th style="padding:0;width:100px"></th>'+days.map(function(){return'<th style="padding:0"></th>';}).join('')+'</tr>';
  var divider='<tr><td colspan="'+(days.length+1)+'" style="padding:0"><div style="border-top:2px solid #1a1a1a"></div></td></tr>';
  var tblStyle='width:100%;border-collapse:collapse;table-layout:fixed;min-width:700px';
  var colgroup='<colgroup><col style="width:100px">'+days.map(function(){return'<col>';}).join('')+'</colgroup>';

  return '<div style="border-top:3px solid #1a1a1a"></div>'
    +'<div class="private-section" style="border-top:none;border-radius:0 0 var(--rl2) var(--rl2)">'
    +'<div class="private-section-hdr" style="display:flex;align-items:center;flex-wrap:wrap;gap:4px">'
    +'🔒 私人記事 <span style="font-size:11px;color:var(--text2);font-weight:400">只有你自己看得到</span>'
    +colorBar()
    +'<span style="font-size:11px;color:var(--text3);margin-left:4px">雙擊編輯 · 打@找工地 · Ctrl+拖拉複製 · Delete刪除</span>'
    +'</div>'
    +'<div style="overflow-x:auto"><table style="'+tblStyle+'">'+colgroup+'<thead>'+hiddenHeader+'</thead><tbody>'
    +makeRow('work','工地記事')
    +divider
    +makeRow('personal','私人記事')
    +'</tbody></table></div></div>';
}

window.pnInput=function(e,type,ds,idx){
  var inp=e.target;
  var val=inp.value||'';
  var pos=inp.selectionStart||0;
  var textBefore=val.substring(0,pos);
  var atIdx=textBefore.lastIndexOf('@');
  var menuEl=document.getElementById('pn-mention-'+type+'-'+ds+'-'+idx);
  if(atIdx>=0&&textBefore.indexOf(' ',atIdx)<0){
    var q=textBefore.substring(atIdx+1).toLowerCase();
    var projs=S.projects.filter(function(p){return p.name.toLowerCase().includes(q);});
    if(projs.length){
      pnMentionActive={type:type,ds:ds,idx:idx,atIdx:atIdx};
      var rect=inp.getBoundingClientRect();
      menuEl.style.cssText='display:block;position:fixed;top:'+(rect.bottom+4)+'px;left:'+rect.left+'px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:0 4px 12px rgba(0,0,0,.12);z-index:500;min-width:150px;max-height:180px;overflow-y:auto';
      menuEl.innerHTML=projs.map(function(p){

          +'onmousedown="pnInsertMention(event,\''+type+'\',\''+ds+'\','+idx+',\''+p.name+'\')">'
          +p.name+'</div>';
      }).join('');
      return;
    }
  }
  if(menuEl){menuEl.style.display='none';}
  pnMentionActive=null;
}

window.pnInsertMention=function(e,type,ds,idx,projName){
  e.preventDefault();
  var inp=document.getElementById('pne-'+type+'-'+ds+'-'+idx);
  if(!inp)return;
  var menuEl=document.getElementById('pn-mention-'+type+'-'+ds+'-'+idx);
  if(menuEl)menuEl.style.display='none';
  pnMentionActive=null;
  // Replace @query with [proj:name] in input value
  var val=inp.value;
  var pos=inp.selectionStart||val.length;
  var textBefore=val.substring(0,pos);
  var atIdx=textBefore.lastIndexOf('@');
  if(atIdx>=0){
    var newVal=val.substring(0,atIdx)+'[proj:'+projName+']'+val.substring(pos);
    inp.value=newVal;
    var newPos=atIdx+('[proj:'+projName+']').length;
    inp.setSelectionRange(newPos,newPos);
  }
  inp.focus();
}

window.pnKeyDown=function(e,type,ds,idx){

window.pnDrop=async function(e,toType,toDs){
  e.preventDefault();e.stopPropagation();
  var raw=e.dataTransfer.getData('text/plain');
  var from=null;
  if(raw){var p=raw.split('|');if(p.length===3)from={type:p[0],ds:p[1],idx:parseInt(p[2])};}
  if(!from)from=pnDragSrc;
  if(!from||!currentUser)return;
  if(from.type===toType&&from.ds===toDs){pnDragSrc=null;return;}
  var pn=S.privateNotes||{work:{},personal:{}};
  var fromItems=(pn[from.type]&&pn[from.type][from.ds])?[...pn[from.type][from.ds]]:[];
  var item=fromItems[from.idx];
  if(!item){pnDragSrc=null;return;}
  var toItems=(pn[toType]&&pn[toType][toDs])?[...pn[toType][toDs]]:[];
  toItems.push(Object.assign({},item));
  var newPn=Object.assign({},pn);
  newPn[toType]=Object.assign({},pn[toType]||{});
  newPn[toType][toDs]=toItems;
  if(!e.ctrlKey){
    fromItems.splice(from.idx,1);
    newPn[from.type]=Object.assign({},newPn[from.type]||{});
    newPn[from.type][from.ds]=fromItems;
  }
  S.privateNotes=newPn;
  await setDoc(doc(db,'privateNotes',currentUser.uid),newPn);
  pnDragSrc=null;
  renderProgress();
}

  function save(){
    span.contentEditable='false';
    const newVal=span.textContent.trim();
    if(newVal===original)return;
    const allSched=[...(proj.schedule||[])];
    const absIdx=allSched.indexOf(ev);if(absIdx<0)return;
    allSched[absIdx]={...ev,[field]:newVal};
    setSyncing();updateDoc(doc(db,'projects',projId),{schedule:allSched}).then(()=>setSynced());
  }
  span.onblur=save;
  span.onkeydown=ke=>{if(ke.key==='Enter'){ke.preventDefault();span.blur();}if(ke.key==='Escape'){span.textContent=original;span.contentEditable='false';}};
}

window.jumpToDate=function(dateStr){
  if(!dateStr)return;
  const target=new Date(dateStr+'T00:00:00');
  const base=today();const dow=base.getDay();const diff=dow===0?-6:1-dow;
  const thisMon=addDays(base,diff);
  const targetDow=target.getDay();const targetDiff=targetDow===0?-6:1-targetDow;
  const targetMon=addDays(target,targetDiff);
  weekOffset=Math.round((targetMon.getTime()-thisMon.getTime())/(7*24*60*60*1000));
  renderProgress();
}

window.openCheckMo=function(projId,stage,label,projName){
  if(!stage)return;
  const allItems=getAllBibleItems(stage);
  if(!allItems.length){alert('此階段尚無項目');return;}
  const key=`${projId}_${stage}`;const stored=S.checks[key]||[];
  const merged=allItems.map((t,i)=>({text:t,done:stored[i]?.done||false}));
  const done=merged.filter(x=>x.done).length;const pct=Math.round(done/merged.length*100);
  const b=S.bible[stage]||{before:[],during:[],after:[]};
  const beforeLen=(b.before||[]).length,duringLen=(b.during||[]).length;
  const PHASES=[{label:'工程前',color:'var(--pl)',from:0,to:beforeLen},{label:'工程中',color:'var(--tl)',from:beforeLen,to:beforeLen+duringLen},{label:'工程後',color:'var(--gl)',from:beforeLen+duringLen,to:merged.length}];
  let itemsHtml='';
  PHASES.forEach(ph=>{
    if(ph.to<=ph.from)return;
    itemsHtml+=`<div style="font-size:11px;font-weight:600;color:var(--text2);margin:10px 0 4px"><span style="background:${ph.color};padding:2px 8px;border-radius:8px">${ph.label}</span></div>`;
    for(let i=ph.from;i<ph.to;i++){
      const item=merged[i];
      itemsHtml+=`<div class="ws-cl-item ${item.done?'done':''}">
        <input type="checkbox" id="ck${i}" ${item.done?'checked':''} onchange="toggleCheck('${projId}','${stage}',${i},this.checked)">
        <label for="ck${i}">${item.text}</label>
      </div>`;
    }
  });
  $('mo-content').innerHTML=`
    <div class="mo-title">${label}</div>
    <div class="mo-sub">${projName} — ${done}/${merged.length} 完成</div>
    <div class="pb-wrap"><div class="pb-fill" style="width:${pct}%;background:${pct===100?'var(--teal)':'var(--purple)'}"></div></div>
    ${itemsHtml}
    <div class="mo-footer"><button class="btn" onclick="closeMo()">關閉</button></div>`;
  $('modal').style.display='flex';
}
window.closeMo=function(){$('modal').style.display='none';}
window.toggleCheck=async function(projId,stage,idx,checked){
  setSyncing();
  const allItems=getAllBibleItems(stage);
  const key=`${projId}_${stage}`;
  const stored=[...(S.checks[key]||allItems.map(t=>({text:t,done:false})))];
  while(stored.length<allItems.length)stored.push({done:false});
  stored[idx]={...stored[idx],done:checked};
  try{await setDoc(doc(db,'checks',key),{items:stored});setSynced();}catch(e){setOffline();}
}

window.bsDrop=async function(e,toS){

  const order=[...getBibleStages()];const fi=order.indexOf(dragSrc);const ti=order.indexOf(toS);
  if(fi<0||ti<0)return;order.splice(fi,1);order.splice(ti,0,dragSrc);

window.addBibleItem=async function(stage,phase){
  if(!isAdmin())return;
  const inp=$(`bib-new-${phase}`);if(!inp)return;
  const text=inp.value.trim();if(!text)return;
  const data=S.bible[stage]||{before:[],during:[],after:[]};
  const updated={...data,[phase]:[...(data[phase]||[]),text]};
  setSyncing();await setDoc(doc(db,'bible',stage),updated);inp.value='';setSynced();
}
window.delBibleItem=async function(stage,phase,idx){
  if(!isAdmin())return;
  const data=S.bible[stage]||{before:[],during:[],after:[]};
  const before=data.before||[];const during=data.during||[];
  const absIdx=(phase==='before'?0:phase==='during'?before.length:before.length+during.length)+idx;
  const phaseItems=[...(data[phase]||[])];phaseItems.splice(idx,1);
  setSyncing();await setDoc(doc(db,'bible',stage),{...data,[phase]:phaseItems});
  const snap=await getDocs(collection(db,'checks'));
  const batch=writeBatch(db);
  snap.docs.filter(d=>d.id.endsWith('_'+stage)).forEach(d=>{
    const arr=d.data().items||[];arr.splice(absIdx,1);
    batch.set(doc(db,'checks',d.id),{items:arr});
  });
  await batch.commit();setSynced();
}

window.addStage=async function(){

  if(getBibleStages().includes(name))return alert('此階段已存在');

window.deleteStage=async function(stage){
  if(!isAdmin())return;
  if(!confirm(`確定刪除「${stage}」？`))return;
  const order=getBibleStages().filter(s=>s!==stage);
  setSyncing();
  await deleteDoc(doc(db,'bible',stage));

  const snap=await getDocs(collection(db,'checks'));
  const batch=writeBatch(db);
  snap.docs.filter(d=>d.id.endsWith('_'+stage)).forEach(d=>batch.delete(doc(db,'checks',d.id)));
  await batch.commit();activeBibleStage=null;setSynced();
}

  ${resigned.length?`<div style="font-size:13px;font-weight:500;margin-bottom:8px;margin-top:16px;color:var(--text3)">離職員工（${resigned.length}）</div>
  ${resigned.map(m=>memberCard(m,true)).join('')}`:''}`;
}
window.toggleMemberInfo=function(uid){expandedMemberInfo[uid]=!expandedMemberInfo[uid];renderMembers();}
window.toggleMemberEdit=function(uid){editingMemberInfo[uid]=!editingMemberInfo[uid];renderMembers();}
window.saveMemberField=async function(uid,field,val){
  if(!isAdmin())return;
  await updateDoc(doc(db,'members',uid),{[field]:val});
}
window.saveEmployeeInfo=async function(uid,field,val){
  if(!isAdmin())return;
  const m=S.members.find(x=>x.id===uid);
  const ei={...(m?.employeeInfo||{}),[field]:val};
  await updateDoc(doc(db,'members',uid),{employeeInfo:ei});
}
window.setMemberStatus=async function(uid,status){
  if(!isAdmin())return;
  const m=S.members.find(x=>x.id===uid);
  if(status==='resigned'&&!confirm('確定要將這位成員設為離職嗎？設定後他將無法再登入系統，但所有資料會保留。'))return;
  const patch={status};
  if(status==='resigned'){
    patch.resignedAt=serverTimestamp();
    const ei={...(m?.employeeInfo||{})};
    if(!ei.resignDate)ei.resignDate=fmtDay(today());
    patch.employeeInfo=ei;
  }
  await updateDoc(doc(db,'members',uid),patch);
}
window.approveMember=async function(uid,role){await updateDoc(doc(db,'members',uid),{role,status:'active'});}
window.rejectMember=async function(uid){if(!confirm('確定拒絕？'))return;await deleteDoc(doc(db,'members',uid));}
window.changeRole=async function(uid,role){await updateDoc(doc(db,'members',uid),{role});}

window.setCalMode=function(m){calMode=m;renderProgress();}
window.changeWeek=function(d){weekOffset+=d;renderProgress();}

// Formula bar functions
var formulaBarState=null; // {type,ds,idx,text} — used for display/label only, not saving
var selGen=0;
function escAttr(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
// Core save: always reads the live value straight off the given input element,
// identified by explicit type/ds/idx (baked into that box at render time) —
// never relies on a shared "current selection" variable that could be stale.
window.pnSaveBox=async function(el,type,ds,idx){
  if(!currentUser||!el)return;
  var text=el.value;
  var pn=S.privateNotes||{work:{},personal:{}};
  var items=(pn[type]&&pn[type][ds])?[...pn[type][ds]]:[];
  while(items.length<=idx)items.push({text:'',color:''});
  items[idx]=Object.assign({},items[idx],{text:text});
  S.privateNotes=Object.assign({},pn);
  S.privateNotes[type]=Object.assign({},pn[type]||{});
  S.privateNotes[type][ds]=items;
  S.privateEditing=null;
  setSyncing();
  await setDoc(doc(db,'privateNotes',currentUser.uid),S.privateNotes);
  setSynced();
  var gen=selGen;
  setTimeout(function(){
    if(selGen===gen){
      S.privateSelected={};
      if(activePanel==='progress')renderProgress();
    }
  },150);
}
// Box (in-place chip) blur — identity is baked into the call at render time.
window.pnBoxBlur=function(el,type,ds,idx){
  pnSaveBox(el,type,ds,idx);
}
function updateFormulaBar(type,ds,idx,text){
  formulaBarState=(type===null)?null:{type:type,ds:ds,idx:idx,text:text||''};
  var bar=document.getElementById('pn-formula-bar');
  var inp=document.getElementById('pn-formula-input');
  var lbl=document.getElementById('pn-formula-label');
  if(!bar||!inp)return;
  if(!formulaBarState){
    bar.classList.remove('active');
    inp.value='';
    return;
  }
  bar.classList.add('active');
  lbl.textContent=(type==='work'?'工地記事':'私人記事')+' · '+ds.slice(5).replace('-','/');
  inp.value=text||'';
}
// Top bar blur — identity comes from formulaBarState (the top bar always
// mirrors whichever item was last selected), but the TEXT is read live
// from the input itself.
window.formulaBarSave=async function(){
  if(!formulaBarState)return;
  var inp=document.getElementById('pn-formula-input');
  await pnSaveBox(inp,formulaBarState.type,formulaBarState.ds,formulaBarState.idx);
}

  $('mo-content').innerHTML=`<div class="mo-title">${ds.slice(5).replace('-','/')} 日期設定</div>
    <div style="margin-top:12px;display:flex;flex-direction:column;gap:10px">
      <div>
        <div style="font-size:12px;color:var(--text2);margin-bottom:6px">顏色</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          ${[{c:'',l:'預設'},{c:'#E24B4A',l:'紅'},{c:'#EF9F27',l:'橘'},
             {c:'#1D9E75',l:'綠'},{c:'#534AB7',l:'藍'},{c:'#9c9690',l:'灰'}].map(col=>
            `<span onclick="document.getElementById('dcp-color').value='${col.c}';document.querySelectorAll('.dcp-dot').forEach(el=>el.style.outline='');this.style.outline='2px solid #333'"
              class="dcp-dot" style="width:24px;height:24px;border-radius:50%;background:${col.c||'#e8e5e0'};cursor:pointer;display:inline-block;border:1.5px solid rgba(0,0,0,.2);${(dc.color||'')===col.c?'outline:2px solid #333':''}" title="${col.l}"></span>`
          ).join('')}
          <input type="color" style="width:28px;height:28px;border:none;cursor:pointer;border-radius:4px" value="${dc.color||'#E24B4A'}" oninput="document.getElementById('dcp-color').value=this.value">
        </div>
        <input type="hidden" id="dcp-color" value="${dc.color||''}">
      </div>
      <div>
        <div style="font-size:12px;color:var(--text2);margin-bottom:6px">備註（如：中秋節、補班日）</div>
        <input type="text" id="dcp-note" value="${dc.note||''}" placeholder="可不填">
      </div>
    </div>
    <div class="mo-footer">
      <button class="btn btn-danger btn-sm" onclick="saveDateColor('${ds}','','')">清除</button>
      <button class="btn" onclick="closeMo()">取消</button>
      <button class="btn btn-p" onclick="saveDateColor('${ds}',document.getElementById('dcp-color').value,document.getElementById('dcp-note').value)">儲存</button>
    </div>`;
  $('modal').style.display='flex';
}
window.saveDateColor=async function(ds,color,note){
  var colors=Object.assign({},S.dateColors);
  if(!color&&!note){delete colors[ds];}
  else{colors[ds]={color:color||'',note:note||''};}
  S.dateColors=colors;
  setSyncing();
  await setDoc(doc(db,'settings','dateColors'),{colors});
  closeMo();setSynced();
}
</script>
